name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AnswerCode.Tests/AnswerCode.Tests.csproj

      - name: Build
        run: dotnet build AnswerCode.Tests/AnswerCode.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test AnswerCode.Tests/AnswerCode.Tests.csproj --no-build --configuration Release --verbosity normal
