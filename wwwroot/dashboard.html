<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnswerCode - Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --success-color: #3fb950;
            --danger-color: #f85149;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh;
        }
        .dashboard-container { max-width:900px; margin:0 auto; padding:24px; }

        .dash-header {
            background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
            border:1px solid var(--border-color); border-radius:12px;
            padding:24px; margin-bottom:24px;
            display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
        }
        .dash-header h1 {
            font-size:1.6rem;
            background: linear-gradient(90deg, var(--accent-color), #a371f7, #f778ba);
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
        }
        .dash-header-actions { display:flex; align-items:center; gap:12px; }
        .dash-header-actions a {
            padding:8px 16px; border-radius:8px; text-decoration:none; font-size:.85rem;
            border:1px solid var(--border-color); color:var(--text-primary); transition:background .2s;
        }
        .dash-header-actions a:hover { background:var(--bg-tertiary); }
        .dash-header-actions .logout { color:var(--danger-color); border-color:var(--danger-color); }

        .user-bar {
            background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px;
            padding:16px 20px; margin-bottom:24px;
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
        }
        .user-bar .user-info { display:flex; align-items:center; gap:10px; }
        .user-bar .user-info img { width:36px; height:36px; border-radius:50%; }
        .user-bar .user-name { font-weight:600; }
        .user-bar .user-email { color:var(--text-secondary); font-size:.85rem; }

        .storage-bar-wrap { flex:1; min-width:200px; max-width:350px; }
        .storage-label { font-size:.82rem; color:var(--text-secondary); margin-bottom:4px; }
        .storage-bar { height:8px; background:var(--bg-tertiary); border-radius:4px; overflow:hidden; }
        .storage-bar-fill { height:100%; background:var(--accent-color); border-radius:4px; transition:width .3s; }
        .storage-bar-fill.warn { background:#d29922; }
        .storage-bar-fill.danger { background:var(--danger-color); }

        .folders-section {
            background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px;
            padding:20px;
        }
        .folders-section h2 { font-size:1.1rem; margin-bottom:16px; }

        table { width:100%; border-collapse:collapse; }
        th { text-align:left; color:var(--text-secondary); font-size:.82rem; font-weight:600;
             text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; border-bottom:1px solid var(--border-color); }
        td { padding:10px 12px; border-bottom:1px solid var(--border-color); font-size:.9rem; }
        tr:hover td { background:rgba(88,166,255,.04); }
        .folder-id { font-family:monospace; color:var(--text-secondary); font-size:.78rem; }
        .display-name {
            font-weight:600; cursor:pointer; padding:2px 6px; border-radius:4px;
            border:1px solid transparent; transition:border-color .2s, background .2s;
        }
        .display-name:hover { border-color:var(--border-color); background:var(--bg-tertiary); }
        .rename-input {
            background:var(--bg-tertiary); border:1px solid var(--accent-color); border-radius:4px;
            color:var(--text-primary); padding:4px 8px; font-size:.9rem; width:100%; outline:none;
        }
        .btn-delete {
            padding:5px 12px; background:transparent; border:1px solid var(--danger-color);
            color:var(--danger-color); border-radius:6px; cursor:pointer; font-size:.8rem; transition:background .2s;
        }
        .btn-delete:hover { background:rgba(248,81,73,.15); }
        .empty-msg { color:var(--text-secondary); text-align:center; padding:32px; font-size:.95rem; }
        .loading { color:var(--text-secondary); text-align:center; padding:24px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dash-header">
            <h1>📊 AnswerCode Dashboard</h1>
            <div class="dash-header-actions">
                <a href="/">← Back to Q&A</a>
                <a href="/api/auth/logout" class="logout">Logout</a>
            </div>
        </div>

        <div class="user-bar" id="userBar" style="display:none">
            <div class="user-info">
                <img id="userAvatar" src="" alt="" style="display:none">
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-email" id="userEmail"></div>
                </div>
            </div>
            <div class="storage-bar-wrap">
                <div class="storage-label" id="storageLabel">Loading...</div>
                <div class="storage-bar"><div class="storage-bar-fill" id="storageBarFill" style="width:0"></div></div>
            </div>
        </div>

        <div class="folders-section">
            <h2>Your Projects</h2>
            <div id="foldersContent"><div class="loading">Loading...</div></div>
        </div>
    </div>

<script>
    async function init() {
        // Check auth
        try {
            const res = await fetch('/api/auth/me');
            if (!res.ok) { window.location.href = '/api/auth/login?returnUrl=/dashboard'; return; }
            const user = await res.json();
            if (!user.authenticated) { window.location.href = '/api/auth/login?returnUrl=/dashboard'; return; }

            document.getElementById('userBar').style.display = '';
            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            if (user.picture) {
                const img = document.getElementById('userAvatar');
                img.src = user.picture; img.style.display = '';
            }
        } catch (e) {
            window.location.href = '/api/auth/login?returnUrl=/dashboard';
            return;
        }

        await Promise.all([loadUsage(), loadFolders()]);
    }

    async function loadUsage() {
        try {
            const res = await fetch('/api/dashboard/usage');
            if (!res.ok) return;
            const data = await res.json();
            const pct = data.maxMB > 0 ? (data.usedMB / data.maxMB) * 100 : 0;
            document.getElementById('storageLabel').textContent =
                `${data.usedMB.toFixed(1)} / ${data.maxMB} MB used`;
            const fill = document.getElementById('storageBarFill');
            fill.style.width = Math.min(pct, 100) + '%';
            fill.className = 'storage-bar-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warn' : '');
        } catch (e) { /* ignore */ }
    }

    async function loadFolders() {
        const container = document.getElementById('foldersContent');
        try {
            const res = await fetch('/api/dashboard/folders');
            if (!res.ok) { container.innerHTML = '<div class="empty-msg">Failed to load folders.</div>'; return; }
            const folders = await res.json();

            if (folders.length === 0) {
                container.innerHTML = '<div class="empty-msg">No projects uploaded yet. Go to the <a href="/" style="color:var(--accent-color)">Q&A page</a> to upload source code.</div>';
                return;
            }

            let html = `<table><thead><tr>
                <th>Project Name</th><th>Files</th><th>Size</th><th>Created</th><th></th>
            </tr></thead><tbody>`;

            folders.forEach(f => {
                const date = new Date(f.createdAt).toLocaleDateString();
                const name = f.displayName || f.folderId;
                html += `<tr id="row-${f.folderId}">
                    <td>
                        <span class="display-name" id="name-${f.folderId}"
                            onclick="startRename('${esc(f.folderId)}')"
                            title="Click to rename">${esc(name)}</span>
                        <div class="folder-id">${esc(f.folderId)}</div>
                    </td>
                    <td>${f.fileCount}</td>
                    <td>${f.sizeMB} MB</td>
                    <td>${date}</td>
                    <td><button class="btn-delete" onclick="deleteFolder('${esc(f.folderId)}')">Delete</button></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<div class="empty-msg">Error loading folders.</div>';
        }
    }

    function startRename(folderId) {
        const span = document.getElementById('name-' + folderId);
        if (!span) return;
        const current = span.textContent;
        const input = document.createElement('input');
        input.className = 'rename-input';
        input.id = 'rename-' + folderId;
        input.value = current;
        input.onblur = () => commitRename(folderId);
        input.onkeydown = (e) => {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') { input.dataset.cancel = '1'; input.blur(); }
        };
        span.replaceWith(input);
        input.focus();
        input.select();
    }

    async function commitRename(folderId) {
        const input = document.getElementById('rename-' + folderId);
        if (!input) return;
        if (input.dataset.cancel === '1') {
            await loadFolders(); // restore original
            return;
        }
        const newName = input.value.trim();
        if (!newName) { await loadFolders(); return; }
        try {
            const res = await fetch(`/api/dashboard/folders/${folderId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ displayName: newName })
            });
            if (!res.ok) { alert('Failed to rename'); }
        } catch (e) { alert('Error: ' + e.message); }
        await loadFolders();
    }

    async function deleteFolder(folderId) {
        if (!confirm(`Delete project "${folderId}"? This cannot be undone.`)) return;
        try {
            const res = await fetch(`/api/dashboard/folders/${folderId}`, { method: 'DELETE' });
            if (!res.ok) { alert('Failed to delete folder'); return; }
            const row = document.getElementById('row-' + folderId);
            if (row) row.remove();
            await loadUsage();
            // If table is now empty, reload to show empty message
            const tbody = document.querySelector('tbody');
            if (tbody && tbody.children.length === 0) loadFolders();
        } catch (e) {
            alert('Error: ' + e.message);
        }
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    init();
</script>
</body>
</html>
